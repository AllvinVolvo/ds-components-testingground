<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Component</title>
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/font-face.8324f4d8.css" data-volvo-css-name="font-face.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/tokens.bf5afda4.css" data-volvo-css-name="tokens.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/styles.1d8be33a.css" data-volvo-css-name="styles.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/styles_md.8c1b3d58.css" data-volvo-css-name="styles_md.css" crossorigin="anonymous" media="(min-width: 30rem)">
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/styles_xl.cd367963.css" data-volvo-css-name="styles_xl.css" crossorigin="anonymous" media="(min-width: 100rem)">
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/styles_hover.47ab975c.css" data-volvo-css-name="styles_hover.css" crossorigin="anonymous" media="(hover: hover)">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="topbar">
        <button id="sidebar-toggle" class="topbar__hamburger" aria-label="Toggle sidebar">
            <div class="topbar__hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
    </div>

    <div class="library-container">
        <nav class="sidebar-nav">
            <div class="sidebar-nav__header">
                <h1 class="sidebar-nav__title">Components</h1>
            </div>
            <ul class="sidebar-nav__list">
                <li class="sidebar-nav__item">
                    <a href="index.html" class="link-plain font-16">Overview</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="media-banner-detail.html" class="link-plain font-16">Media Banner</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="card-detail.html" class="link-plain font-16">Card</a>
                </li>
            </ul>
        </nav>

        <main class="library-content">
            <div class="page-container">
                <h1>Card</h1>
                <section class="demo-section">
                    <h2>Card Component</h2>
                    <div class="card-detail-placeholder">
                        <div class="card-detail-placeholder__image aspect-1/1">
                            <img src="./src/test.avif" alt="Card component placeholder" class="component-card__image">
                        </div>
                        <h3 class="card-detail-placeholder__title">Card</h3>
                        <p class="card-detail-placeholder__text">This is the detail page scaffold for the Card component. We can build out variants and specs here next.</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebar = document.querySelector('.sidebar-nav');
        const SIDEBAR_STATE_KEY = 'sidebarState';

        // Update icon state: hamburger when closed, cross when open
        function updateIconState() {
            if (sidebar.classList.contains('collapsed')) {
                sidebarToggle.classList.remove('active'); // hamburger
            } else {
                sidebarToggle.classList.add('active'); // cross
            }
        }

        // Restore sidebar state on page load
        function restoreSidebarState() {
            const savedState = localStorage.getItem(SIDEBAR_STATE_KEY);
            if (savedState === 'collapsed') {
                sidebar.classList.add('collapsed');
            } else {
                sidebar.classList.remove('collapsed');
            }
            updateIconState();
        }

        // Save sidebar state to localStorage
        function saveSidebarState() {
            const isCollapsed = sidebar.classList.contains('collapsed');
            localStorage.setItem(SIDEBAR_STATE_KEY, isCollapsed ? 'collapsed' : 'open');
        }

        // Restore state when page loads
        restoreSidebarState();

        // Toggle only on hamburger click
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            updateIconState();
            saveSidebarState();
        });
    </script>
</body>
</html>
