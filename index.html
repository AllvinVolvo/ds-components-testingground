            <span class="topbar__text topbar__text--close">Close</span>
        </button>
    </div>

    <div class="library-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar-nav">
            <div class="sidebar-nav__header">
                <h1 class="sidebar-nav__title heading-2 text-primary">Components</h1>
            </div>
            <ul class="sidebar-nav__list">
                <li class="sidebar-nav__item">
                    <a href="index.html" class="font-16 text-primary">Overview</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="media-banner-detail.html" class="font-16 text-primary">Media Banner</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="card-detail.html" class="font-16 text-primary">Card</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="text-hero-detail.html" class="font-16 text-primary">Text Hero</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="compact-media-card-detail.html" class="font-16 text-primary">Compact Media Card</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="selectable-chip-detail.html" class="font-16 text-primary">Selectable Chip</a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="library-content">
            <div class="page-container">
                <section class="overview-section">
                    <h2 class="heading-2 text-primary mb-48">Component Library</h2>
                    <p class="overview-section__description font-16 text-secondary">Browse and explore our component library.</p>

                    <!-- Components Grid -->
                    <div class="components-grid">
                        <!-- Media Banner Card -->
                        <media-card
                          image="./src/1.jpg"
                          title="Media Banner"
                          subtitle="Responsive layout"
                          body="Image and text content with flexible aspect ratios."
                          button-text="View Component"
                          link="media-banner-detail.html"
                          ratio="4:3"
                          variant="primary">
                        </media-card>

                        <!-- Media Card Component -->
                        <media-card
                          image="./src/8.jpg"
                          title="Media Card"
                          subtitle="Flexible container"
                          body="Image on top with customizable content below."
                          button-text="View Component"
                          link="card-detail.html"
                          ratio="4:3"
                          variant="primary">
                        </media-card>

                                                <!-- Text Hero Component -->
                                                <media-card
                                                    image="./src/4.jpg"
                                                    title="Text Hero"
                                                    subtitle="Typography-led hero"
                                                    body="Full-bleed text layout with optional CTAs."
                                                    button-text="View Component"
                                                    link="text-hero-detail.html"
                                                    ratio="4:3"
                                                    variant="primary">
                                                </media-card>

                        <!-- Compact Media Card Component -->
                        <media-card
                          image="./src/1.jpg"
                          title="Compact Media Card"
                          subtitle="Clickable card"
                          body="Compact card with image, title, and forward arrow."
                          button-text="View Component"
                          link="compact-media-card-detail.html"

                        <!-- Selectable Chip Component -->
                        <media-card
                          image="./src/5.jpg"
                          title="Selectable Chip"
                          subtitle="Volvo CSS import"
                          body="Toggle button component for filtering and selection."
                          button-text="View Component"
                          link="selectable-chip-detail.html"
                          ratio="4:3"
                          variant="primary">
                        </media-card>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebar = document.querySelector('.sidebar-nav');
        const SIDEBAR_STATE_KEY = 'sidebarState';

        // Update icon state: hamburger when closed, cross when open
        function updateIconState() {
            if (sidebar.classList.contains('collapsed')) {
                sidebarToggle.classList.remove('active'); // hamburger
            } else {
                sidebarToggle.classList.add('active'); // cross
            }
        }

        // Restore sidebar state on page load
        function restoreSidebarState() {
            const savedState = localStorage.getItem(SIDEBAR_STATE_KEY);
            if (savedState === 'collapsed') {
                sidebar.classList.add('collapsed');
            } else {
                sidebar.classList.remove('collapsed');
            }
            updateIconState();
        }

        // Save sidebar state to localStorage
        function saveSidebarState() {
            const isCollapsed = sidebar.classList.contains('collapsed');
            localStorage.setItem(SIDEBAR_STATE_KEY, isCollapsed ? 'collapsed' : 'open');
        }

        // Restore state when page loads
        restoreSidebarState();

        // Toggle only on hamburger click
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            updateIconState();
            saveSidebarState();
        });
    </script>
</body>
