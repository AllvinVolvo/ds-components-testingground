<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Hero Component</title>
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/font-face.8324f4d8.css" data-volvo-css-name="font-face.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/tokens.bf5afda4.css" data-volvo-css-name="tokens.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/styles.1d8be33a.css" data-volvo-css-name="styles.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/styles_md.8c1b3d58.css" data-volvo-css-name="styles_md.css" crossorigin="anonymous" media="(min-width: 30rem)">
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/styles_xl.cd367963.css" data-volvo-css-name="styles_xl.css" crossorigin="anonymous" media="(min-width: 100rem)">
    <link rel="stylesheet" href="https://www.volvocars.com/static/shared/pkg/css/v1/styles_hover.47ab975c.css" data-volvo-css-name="styles_hover.css" crossorigin="anonymous" media="(hover: hover)">
    <link rel="stylesheet" href="styles.css">
    <script src="components/text-hero.js"></script>
</head>
<body>
    <div class="topbar">
        <button id="sidebar-toggle" class="topbar__hamburger font-16 text-primary" aria-label="Toggle sidebar">
            <span class="topbar__text topbar__text--menu">Menu</span>
            <span class="topbar__text topbar__text--close">Close</span>
        </button>
    </div>

    <div class="library-container">
        <nav class="sidebar-nav">
            <div class="sidebar-nav__header">
                <h1 class="sidebar-nav__title heading-2 text-primary">Components</h1>
            </div>
            <ul class="sidebar-nav__list">
                <li class="sidebar-nav__item">
                    <a href="index.html" class="font-16 text-primary">Overview</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="media-banner-detail.html" class="font-16 text-primary">Media Banner</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="card-detail.html" class="font-16 text-primary">Card</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="text-hero-detail.html" class="font-16 text-primary">Text Hero</a>
                </li>
                <li class="sidebar-nav__item">
                    <a href="compact-media-card-detail.html" class="font-16 text-primary">Compact Media Card</a>
                </li>
            </ul>
        </nav>

        <main class="library-content">
            <div class="page-container">
                <h1 class="heading-1 text-primary mb-64">Text Hero</h1>
                <p class="font-16 text-primary mb-48">A full-bleed text hero with statement typography and optional call-to-action variants.</p>
                <h2 class="heading-2 text-primary mb-48">Variants</h2>
                
                <section class="demo-section mb-64">
                                        <h2 class="heading-2 text-primary mb-48">Without CTA</h2>
                    <text-hero 
                      title="Redefining Electric Performance"
                      subtitle="Experience Swedish innovation in motion">
                    </text-hero>
                </section>

                <section class="demo-section mb-64">
                                        <h2 class="heading-2 text-primary mb-48">With CTA: Button</h2>
                    <text-hero 
                      title="Sustainable Mobility Solutions"
                                            subtitle="Leading the way in carbon-neutral transportation"
                                            cta-type="button"
                                            cta-primary-text="Explore">
                    </text-hero>
                </section>

                                <section class="demo-section">
                                        <h2 class="heading-2 text-primary mb-48">With CTA: Button Group</h2>
                    <text-hero 
                                            title="Safety Is Our Priority"
                                            subtitle="Advanced protection systems for every journey"
                                            cta-type="button-group"
                                            cta-primary-text="Build Yours"
                                            cta-secondary-text="Compare">
                    </text-hero>
                </section>
            </div>
        </main>
    </div>

    <script>
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebar = document.querySelector('.sidebar-nav');
        const SIDEBAR_STATE_KEY = 'sidebarState';

        // Update icon state: hamburger when closed, cross when open
        function updateIconState() {
            if (sidebar.classList.contains('collapsed')) {
                sidebarToggle.classList.remove('active'); // hamburger
            } else {
                sidebarToggle.classList.add('active'); // cross
            }
        }

        // Restore sidebar state on page load
        function restoreSidebarState() {
            const savedState = localStorage.getItem(SIDEBAR_STATE_KEY);
            if (savedState === 'collapsed') {
                sidebar.classList.add('collapsed');
            } else {
                sidebar.classList.remove('collapsed');
            }
            updateIconState();
        }

        // Save sidebar state to localStorage
        function saveSidebarState() {
            const isCollapsed = sidebar.classList.contains('collapsed');
            localStorage.setItem(SIDEBAR_STATE_KEY, isCollapsed ? 'collapsed' : 'open');
        }

        // Restore state when page loads
        restoreSidebarState();

        // Toggle only on hamburger click
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            updateIconState();
            saveSidebarState();
        });
    </script>
</body>
</html>
